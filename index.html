<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRMNL_v3.1_FREQ</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --dim: #444444;
            --font: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            padding: 0 15px 240px 15px;
            line-height: 1.4;
        }

        /* --- UI ELEMENTS --- */
        input, textarea, button {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--text);
            font-family: var(--font);
            border-radius: 0;
            padding: 8px;
            font-size: 14px;
        }

        button { background: var(--text); color: var(--bg); font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:active { background: var(--bg); color: var(--text); }
        
        .dim-btn { background: var(--bg); color: var(--text); border: 1px solid var(--dim); font-size: 10px; padding: 4px 8px; }
        .dim-btn.active { border-color: var(--text); border-width: 2px; }

        .del-btn { background: var(--bg); color: var(--text); border: none; padding: 0 5px; font-size: 14px; color: var(--dim); }

        /* --- LAYOUT --- */
        .header {
            position: sticky; top: 0; background: var(--bg);
            padding: 15px 0; border-bottom: 2px solid var(--text);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }

        .nav-bar { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--dim); margin-bottom: 20px; }

        section { margin-bottom: 30px; }
        h2 { font-size: 11px; text-transform: uppercase; margin-bottom: 8px; color: var(--text); }

        .item-container { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; padding: 8px; border: 1px solid #222; }

        .checkbox-container {
            display: inline-block; position: relative; width: 18px; height: 18px; border: 1px solid var(--text); flex-shrink: 0; margin-top: 2px;
        }
        .checkbox-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background-color: var(--bg); }
        .checkbox-container input:checked ~ .checkmark { background-color: var(--text); }

        .content-box { flex-grow: 1; }
        .meta-tag { font-size: 9px; color: var(--dim); text-transform: uppercase; display: block; }
        .done { text-decoration: line-through; color: var(--dim); }

        .log-entry { border: 1px solid var(--text); padding: 10px; margin-bottom: 10px; }

        /* --- STICKY FOOTER --- */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg); border-top: 2px solid var(--text);
            padding: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 20;
        }

        .input-row { display: flex; gap: 5px; }
        textarea { flex: 1; height: 40px; resize: none; }
        
        .day-row { display: flex; gap: 4px; margin-top: 5px; }
        .day-btn { width: 25px; height: 25px; padding: 0; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--dim); color: var(--dim); background: var(--bg); }
        .day-btn.selected { border-color: var(--text); color: var(--text); font-weight: bold; }

        #datePicker { border: 1px solid var(--dim); font-size: 11px; padding: 2px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <strong>&gt; TRMNL_CORE_v3.1</strong>
        <input type="date" id="datePicker">
    </div>

    <div class="nav-bar">
        <button class="dim-btn" id="btn-today" onclick="jumpTo('today')">TODAY</button>
        <button class="dim-btn" id="btn-tomorrow" onclick="jumpTo('tomorrow')">TOMORROW</button>
    </div>

    <section id="goals-section">
        <h2 id="goal-header">// TARGET_LIST</h2>
        <div id="goalList"></div>
        
        <div style="border: 1px solid var(--dim); padding: 10px; margin-top: 10px;">
            <div class="input-row">
                <input type="text" id="goalInput" placeholder="NEW_TARGET..." style="flex:1;">
                <button onclick="addGoal()">+</button>
            </div>
            <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;">
                <label style="font-size: 10px; color: var(--dim); display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" id="recurringToggle" onchange="toggleDayRow()"> RECURRING_PROTO
                </label>
                <div id="daySelection" class="day-row hidden">
                    <button class="day-btn selected" onclick="toggleDay(0, this)">S</button>
                    <button class="day-btn selected" onclick="toggleDay(1, this)">M</button>
                    <button class="day-btn selected" onclick="toggleDay(2, this)">T</button>
                    <button class="day-btn selected" onclick="toggleDay(3, this)">W</button>
                    <button class="day-btn selected" onclick="toggleDay(4, this)">T</button>
                    <button class="day-btn selected" onclick="toggleDay(5, this)">F</button>
                    <button class="day-btn selected" onclick="toggleDay(6, this)">S</button>
                </div>
            </div>
        </div>
    </section>

    <section id="log-section">
        <h2>// ACTIVITY_STREAM</h2>
        <div id="logFeed"></div>
    </section>

    <div class="footer" id="main-footer">
        <div class="input-row" style="overflow-x: auto; padding-bottom: 5px;">
            <button class="dim-btn active" id="cat-WORK" onclick="setCat('WORK')">WORK</button>
            <button class="dim-btn" id="cat-LIFE" onclick="setCat('LIFE')">LIFE</button>
            <button class="dim-btn" id="cat-HABITS" onclick="setCat('HABITS')">HABITS</button>
            <button class="dim-btn" id="cat-MISC" onclick="setCat('MISC')">MISC</button>
        </div>
        <div class="input-row">
            <textarea id="logInput" placeholder="ENTER_LOG..."></textarea>
            <button onclick="addEntry()">LOG</button>
        </div>
    </div>

    <script>
        let currentCat = 'WORK';
        let viewDate = new Date().toLocaleDateString('en-CA'); 
        let activeDays = [0,1,2,3,4,5,6]; // All days selected by default

        window.onload = () => {
            document.getElementById('datePicker').value = viewDate;
            refresh();
        };

        document.getElementById('datePicker').onchange = (e) => {
            viewDate = e.target.value;
            refresh();
        };

        function jumpTo(target) {
            const d = new Date();
            if (target === 'tomorrow') d.setDate(d.getDate() + 1);
            viewDate = d.toLocaleDateString('en-CA');
            document.getElementById('datePicker').value = viewDate;
            refresh();
        }

        function setCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.footer .dim-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`cat-${cat}`).classList.add('active');
        }

        function toggleDayRow() {
            document.getElementById('daySelection').classList.toggle('hidden', !document.getElementById('recurringToggle').checked);
        }

        function toggleDay(day, btn) {
            if (activeDays.includes(day)) {
                activeDays = activeDays.filter(d => d !== day);
                btn.classList.remove('selected');
            } else {
                activeDays.push(day);
                btn.classList.add('selected');
            }
        }

        function getData() {
            return JSON.parse(localStorage.getItem('terminal_v3_1_data')) || { goals: {}, logs: {}, recurring: [] };
        }

        function saveData(data) { localStorage.setItem('terminal_v3_1_data', JSON.stringify(data)); }

        // --- GOAL LOGIC ---
        function addGoal() {
            const val = document.getElementById('goalInput').value.trim();
            const isRec = document.getElementById('recurringToggle').checked;
            if (!val) return;
            
            const data = getData();
            const id = Date.now();

            if (isRec) {
                // done: {} stores completion status per date: { "2026-03-28": true }
                data.recurring.push({ id, text: val, cat: currentCat, days: [...activeDays], done: {} });
            } else {
                if (!data.goals[viewDate]) data.goals[viewDate] = [];
                data.goals[viewDate].push({ id, text: val, cat: currentCat, done: false });
            }

            saveData(data);
            document.getElementById('goalInput').value = '';
            refresh();
        }

        function toggleGoal(id, type) {
            const data = getData();
            if (type === 'rec') {
                const g = data.recurring.find(x => x.id === id);
                if (g) g.done[viewDate] = !g.done[viewDate];
            } else {
                const g = data.goals[viewDate].find(x => x.id === id);
                if (g) g.done = !g.done;
            }
            saveData(data);
            refresh();
        }

        function deleteGoal(id, type) {
            if (!confirm("PURGE_TARGET?")) return;
            const data = getData();
            if (type === 'rec') { data.recurring = data.recurring.filter(x => x.id !== id); }
            else { data.goals[viewDate] = data.goals[viewDate].filter(x => x.id !== id); }
            saveData(data);
            refresh();
        }

        // --- LOG LOGIC ---
        function addEntry() {
            const val = document.getElementById('logInput').value.trim();
            if (!val) return;
            const data = getData();
            if (!data.logs[viewDate]) data.logs[viewDate] = [];
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            if (data.logs[viewDate].length > 0) {
                const last = data.logs[viewDate][data.logs[viewDate].length - 1];
                if (!last.end) last.end = time;
            }
            data.logs[viewDate].push({ id: Date.now(), start: time, end: null, cat: currentCat, text: val });
            saveData(data);
            document.getElementById('logInput').value = '';
            refresh();
        }

        function refresh() {
            const data = getData();
            const today = new Date().toLocaleDateString('en-CA');
            const dayOfWeek = new Date(viewDate + "T00:00:00").getDay();
            const isFuture = viewDate > today;

            document.getElementById('goal-header').innerText = `// TARGET_LIST [${viewDate}]`;
            document.getElementById('log-section').className = isFuture ? 'hidden' : '';
            document.getElementById('main-footer').className = isFuture ? 'hidden' : 'footer';
            document.body.style.paddingBottom = isFuture ? '60px' : '240px';

            const gDiv = document.getElementById('goalList');
            gDiv.innerHTML = '';
            
            // Filter Recurring Goals by Day of Week
            const recurringOnDay = data.recurring.filter(g => g.days.includes(dayOfWeek));
            const onceGoals = data.goals[viewDate] || [];

            [...recurringOnDay.map(g => ({...g, type: 'rec', isDone: !!g.done[viewDate]})), 
             ...onceGoals.map(g => ({...g, type: 'once', isDone: g.done}))].forEach(g => {
                const item = document.createElement('div');
                item.className = 'item-container';
                item.innerHTML = `
                    <label class="checkbox-container">
                        <input type="checkbox" ${g.isDone ? 'checked' : ''} onchange="toggleGoal(${g.id}, '${g.type}')">
                        <span class="checkmark"></span>
                    </label>
                    <div class="content-box">
                        <span class="meta-tag">${g.type === 'rec' ? '[REC] ' : ''}${g.cat}</span>
                        <span class="${g.isDone ? 'done' : ''}">${g.text}</span>
                    </div>
                    <button class="del-btn" onclick="deleteGoal(${g.id}, '${g.type}')">[X]</button>
                `;
                gDiv.appendChild(item);
            });

            const lDiv = document.getElementById('logFeed');
            lDiv.innerHTML = '';
            (data.logs[viewDate] || []).slice().reverse().forEach(l => {
                lDiv.innerHTML += `
                    <div class="log-entry">
                        <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--dim); margin-bottom:5px;">
                            <span>[${l.start} - ${l.end || 'ACTIVE'}] :: ${l.cat}</span>
                        </div>
                        <div>${l.text}</div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
